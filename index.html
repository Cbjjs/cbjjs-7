<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>CBJJS - Confederação Brasileira de Jiu-Jitsu Social</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              cbjjs: {
                blue: '#1e3a8a',
                lightBlue: '#3b82f6',
                green: '#16a34a',
                gold: '#eab308',
                dark: '#0f172a',
                surface: '#f8fafc',
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            boxShadow: {
              'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
              'glow': '0 0 15px rgba(59, 130, 246, 0.5)',
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Global Scrollbar Styling */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      .dark ::-webkit-scrollbar-track {
        background: #0f172a; 
      }

      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 9999px;
      }

      .dark ::-webkit-scrollbar-thumb {
        background: #334155; 
      }

      /* Shimmer Green Effect */
      @keyframes shimmer-green {
        0% { transform: translateX(-150%); }
        50%, 100% { transform: translateX(150%); }
      }

      .animate-shimmer-green::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          to right,
          transparent,
          rgba(34, 197, 94, 0.1) 20%,
          rgba(34, 197, 94, 0.4) 50%,
          rgba(34, 197, 94, 0.1) 80%,
          transparent
        );
        animation: shimmer-green 5s infinite;
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .animate-fadeIn {
        animation: fadeIn 0.4s ease-out forwards;
      }
    </style>
  <script type="importmap">

  "imports": {

    "@tanstack/react-query": "https://esm.sh/@tanstack/react-query@5.28.4"
  }
}
</script>
</head>
  <body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 transition-colors duration-200">
    <div id="root"></div>

  </body>
</html>
